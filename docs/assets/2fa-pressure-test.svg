    <tspan x="880" dy="0">GitHub gave</tspan>
    <tspan x="880" dy="58">the deadline.</tspan>
    <tspan x="880" dy="58">Klava shipped</tspan>
    <tspan x="880" dy="58">the receipts.</tspan>
  </text>
  <text x="880" y="478" fill="#C9D5DA" font-family="'Space Grotesk', sans-serif" font-size="24">
