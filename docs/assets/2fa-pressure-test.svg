    <tspan x="880" dy="34">Guarded terminal</tspan>
    <tspan x="880" dy="34">Task transcript</tspan>
  </text>
  <text x="880" y="592" fill="#9FD8C9" font-family="'IBM Plex Mono', monospace" font-size="17">
